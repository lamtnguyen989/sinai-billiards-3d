name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  SLANG_VERSION: 2026.10.2

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust_release: 
          - stable

    steps:
    - uses: actions/checkout@v6
    - uses: Swatinem/rust-cache@v2.9.1

    - name: Cache slang
      id: slang-cache
      uses: actions/cache@v5
      with:
        path: ~/.local/slang
        key: slang-${{ runner.os }}-${{ env.SLANG_VERSION }}
    
    - name: Install Slang # If cache miss
      if: steps.slang-cache.outputs.cache-hit != 'true'
      run: |
        chmod +x .github/slang-setup.sh && bash .github/slang-setup.sh
    
    - name: Validate Slang installation
      run: |
        echo "$HOME/.local/slang/bin" >> "$GITHUB_PATH"
        $HOME/.local/slang/bin/slangc --version
    
    - name: Compile shaders
      run: |
        chmod +x scripts/compile-shaders.sh
        bash scripts/compile-shaders.sh

    - name: Setup Rust
      run: rustup update ${{ matrix.rust_release }} && rustup default ${{ matrix.rust_release }}

    - name: Build
      run: RUSTFLAGS="-Awarnings" cargo build --verbose

    - name: Run tests
      run: RUSTFLAGS="-Awarnings" cargo test --verbose
