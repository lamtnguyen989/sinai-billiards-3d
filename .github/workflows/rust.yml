name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust_release: 
          - stable

    steps:
    - uses: actions/checkout@v4
    - uses: Swatinem/rust-cache@v2.9.1
    - run: rustup update ${{ matrix.rust_release }} && rustup default ${{ matrix.rust_release }}
    - name: Build
      run: RUSTFLAGS="-Awarnings" cargo build --verbose
    - name: Run tests
      run: RUSTFLAGS="-Awarnings" cargo test --verbose
